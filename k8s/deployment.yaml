apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-webapp-deployment
  labels:
    app: python-webapp
spec:
  replicas: 2 # Runs two instances for high availability
  selector:
    matchLabels:
      app: python-webapp
  template:
    metadata:
      labels:
        app: python-webapp
    spec:
      containers:
      - name: python-webapp-container
        image: my-python-webapp:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: python-webapp-service
spec:
  type: LoadBalancer # Exposes the app to the internet (creates an AWS Load Balancer)
  selector:
    app: python-webapp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000